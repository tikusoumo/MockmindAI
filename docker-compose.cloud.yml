services:
  # Redis Queue for Egress
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Local LiveKit Egress (Burns room audio/video to local file system)
  egress:
    image: livekit/egress:latest
    environment:
      - EGRESS_CONFIG_FILE=/out/egress.yaml
    volumes:
      - ./apps/api/public/recordings:/out
    depends_on:
      - livekit
      - redis

  # Database - Required for API
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-voice_agent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-voice_agent}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Admin Interface for Database
  pgadmin:
    image: dpage/pgadmin4:8.6
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # LiveKit Server - Real-time communication
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --udp-port 52000-52100 --redis-host redis:6379
    ports:
      - "7880:7880"   # WebSocket
      - "7881:7881"   # RTC over TCP
      - "52000-52100:52000-52100/udp"  # RTC over UDP (avoid Windows excluded UDP range)
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"

  # NestJS API - Main backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: bun run start:prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@db:5432/voice_agent}
      PORT: 8000
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      REPORT_PENDING_TIMEOUT_SECONDS: ${REPORT_PENDING_TIMEOUT_SECONDS:-90}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started

  # Python Voice Agent Worker - Cloud Model Configuration
  agent-worker:
    build:
      context: .
      dockerfile: apps/ai-services/Dockerfile
      args:
        PRELOAD_MODELS: ${PRELOAD_MODELS:-0}
    environment:
      APP_ENV: ${APP_ENV:-dev}
      USE_LOCAL_AI: ${USE_LOCAL_AI:-true}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}

      # LiveKit worker process tuning
      LIVEKIT_NUM_IDLE_PROCESSES: ${LIVEKIT_NUM_IDLE_PROCESSES:-1}
      LIVEKIT_INITIALIZE_PROCESS_TIMEOUT: ${LIVEKIT_INITIALIZE_PROCESS_TIMEOUT:-60}
      LIVEKIT_JOB_MEMORY_WARN_MB: ${LIVEKIT_JOB_MEMORY_WARN_MB:-1200}
      LIVEKIT_JOB_MEMORY_LIMIT_MB: ${LIVEKIT_JOB_MEMORY_LIMIT_MB:-0}
      
      # Cloud AI Keys - Configure these in .env
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      
      # Model Selection (defaults tuned for local stack)
      LLM_PROVIDER: openai # google, openai, groq
      STT_PROVIDER: openai # google, deepgram, openai
      TTS_PROVIDER: openai # google, deepgram, openai, elevenlabs

      # Local AI endpoint routing inside Docker network
      WHISPER_BASE_URL: http://whisper:80/v1
      KOKORO_BASE_URL: http://kokoro:8880/v1
      LLAMA_BASE_URL: http://llama_cpp:11434/v1
      
      # Qdrant vector store
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - livekit
      - qdrant
    restart: unless-stopped

  # Python FastAPI HTTP server - REST API + Swagger Docs
  agent-api:
    build:
      context: .
      dockerfile: apps/ai-services/Dockerfile
      args:
        PRELOAD_MODELS: ${PRELOAD_MODELS:-0}
    command: ["python", "-m", "uvicorn", "agent.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      USE_LOCAL_AI: ${USE_LOCAL_AI:-true}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@db:5432/voice_agent}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_PROVIDER: openai
      STT_PROVIDER: openai
      TTS_PROVIDER: openai

      # Local AI endpoint routing inside Docker network
      WHISPER_BASE_URL: http://whisper:80/v1
      KOKORO_BASE_URL: http://kokoro:8880/v1
      LLAMA_BASE_URL: http://llama_cpp:11434/v1
      QDRANT_URL: http://qdrant:6333
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  pgadmin-data:
  qdrant_storage:
