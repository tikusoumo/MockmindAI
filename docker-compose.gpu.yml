services:
  # Redis Queue for Egress
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Local LiveKit Egress (Burns room audio/video to local file system)
  egress:
    image: livekit/egress:latest
    environment:
      - EGRESS_CONFIG_FILE=/out/egress.yaml
    volumes:
      - ./apps/api/public/recordings:/out
    depends_on:
      - livekit
      - redis

  kokoro:
    build:
      context: ./inference/kokoro
    ports:
      - "8880:8880"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command:
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - --hf-repo
      - "${LLAMA_HF_REPO:-unsloth/Qwen3-4B-Instruct-2507-GGUF}"
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen3-4b}"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-16384}"
    ports:
      - "${LLAMA_HOST_PORT:-11436}:11434"
    volumes:
      - ./inference/llama/models:/models
    environment:
      - XDG_CACHE_HOME=/models
      - HF_HOME=/models
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-35}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
      
  whisper:
    build:
      context: ./inference/whisper
    ports:
      - "11435:80"
    volumes:
      - whisper-data:/data
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-Systran/faster-whisper-small}
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
      - DATA_DIR=/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisper-data:
